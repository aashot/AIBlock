<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Feed Filter</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="header">
    <h1>Feed Filter</h1>
    <label class="toggle" id="toggle-label">
      <input type="checkbox" id="toggle-input" />
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="stats" class="stats">
    <span id="stats-text">No posts scanned yet</span>
  </div>

  <form id="add-form">
    <input type="text" id="keyword-input" placeholder="Add custom keyword…" required autocomplete="off" />
    <button type="submit">Add</button>
  </form>

  <div class="section-header">
    <span class="section-title" id="keyword-count">Keywords (0)</span>
    <button id="reset-btn" title="Reset to defaults">Reset</button>
  </div>

  <ul id="keyword-list"></ul>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>

</html>
