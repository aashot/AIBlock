<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Red Octagon -->
  <polygon points="38,4 90,4 124,38 124,90 90,124 38,124 4,90 4,38" fill="#cc1016" />
  
  <!-- White Inner Border -->
  <polygon points="41,10 87,10 118,41 118,87 87,118 41,118 10,87 10,41" fill="none" stroke="#ffffff" stroke-width="4" />
  
  <!-- Hand -->
  <g fill="#ffffff">
    <!-- Palm -->
    <path d="M 32 65 L 84 65 C 90 65 95 72 95 80 C 95 95 75 106 58 106 C 40 106 32 95 32 80 Z" />
    <!-- Pinky -->
    <rect x="32" y="45" width="10" height="30" rx="5" />
    <!-- Ring -->
    <rect x="46" y="28" width="10" height="45" rx="5" />
    <!-- Middle -->
    <rect x="60" y="22" width="10" height="50" rx="5" />
    <!-- Index -->
    <rect x="74" y="28" width="10" height="45" rx="5" />
    <!-- Thumb base -->
    <circle cx="89" cy="70" r="6" />
    <!-- Thumb -->
    <rect x="83" y="47" width="12" height="28" rx="5" transform="rotate(35 89 70)" />
  </g>
  
  <!-- "AI" text in red -->
  <text x="61" y="94" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="34" fill="#cc1016" text-anchor="middle" letter-spacing="-1">AI</text>
  
  <!-- Red Strikethrough line -->
  <line x1="39" y1="99" x2="84" y2="60" stroke="#cc1016" stroke-width="6" stroke-linecap="round" />
</svg>
